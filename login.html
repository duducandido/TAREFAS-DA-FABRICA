<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Team Task Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <div class="login-page-wrapper">
        <div class="login-card">
            <h1>Bem-vindo</h1>
            <p class="subtitle">Acesse sua conta para gerenciar o setor</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="login-actions">
                    <button type="submit" class="btn btn-login-primary">Entrar</button>
                </div>
            </form>

            <div class="login-footer">
                <p>Primeiro acesso? <a href="#">Configure sua conta aqui</a></p>
            </div>
        </div>
    </div>

    <script>
        // Production Login/Register simulation
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const submitBtn = document.querySelector('.btn-login-primary');
        const heading = document.querySelector('.login-card h1');
        const subtitle = document.querySelector('.subtitle');
        const toggleLink = document.querySelector('.login-footer a');
        const footerText = document.querySelector('.login-footer p');

        let isRegisterMode = false;

        function formatNameFromEmail(email) {
            const handle = email.split('@')[0];
            // Replace dots/dashes with spaces and capitalize each word
            return handle.split(/[.\-_]/).map(word =>
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        }

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isRegisterMode = !isRegisterMode;

            if (isRegisterMode) {
                heading.textContent = 'Configurar Acesso';
                subtitle.textContent = 'Use seu e-mail corporativo Zello';
                submitBtn.textContent = 'Finalizar Configuração';
                footerText.innerHTML = 'Já configurou sua conta? <a href="#">Fazer login</a>';
            } else {
                heading.textContent = 'Bem-vindo';
                subtitle.textContent = 'Acesse o painel do setor';
                submitBtn.textContent = 'Entrar';
                footerText.innerHTML = 'Primeiro acesso? <a href="#">Configure sua conta aqui</a>';
            }

            // Re-assign listener to the new link
            document.querySelector('.login-footer a').onclick = (ev) => {
                ev.preventDefault();
                toggleLink.dispatchEvent(new Event('click'));
            };
        });

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const email = emailInput.value;
            const userName = formatNameFromEmail(email);

            submitBtn.textContent = isRegisterMode ? 'Configurando...' : 'Autenticando...';
            submitBtn.disabled = true;

            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', userName);

                if (isRegisterMode) alert('Boas-vindas, ' + userName + '! Sua conta Zello foi configurada.');
                window.location.href = 'index.html';
            }, 800);
        });
    </script>
</body>

</html>
