<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Team Task Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <div class="login-page-wrapper">
        <div class="login-card">
            <h1>Bem-vindo</h1>
            <p class="subtitle">Acesse sua conta para gerenciar o setor</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="login-actions">
                    <button type="submit" class="btn btn-login-primary">Entrar</button>
                    <button type="button" class="btn btn-login-outline" id="test-login">Login de Teste
                        (Offline)</button>
                </div>
            </form>

            <div class="login-footer">
                <p>Não tem uma conta? <a href="#">Primeiro acesso/Cadastrar</a></p>
            </div>
        </div>
    </div>

    <script>
        // Simple login simulation
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            // In a real app, we would validate credentials here
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        });

        document.getElementById('test-login').addEventListener('click', function () {
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
